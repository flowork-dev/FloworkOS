# (English Hardcode) This file contains ALL THREE fixes:
# 1. 'seed_dev_engine.py' entrypoint for Gateway (FIXED)
# 2. 'cloudflared tunnel run --token' syntax (FIXED)
# 3. 'depends_on.condition' for Cloudflared (THE FINAL FIX)
########################################################################

name: flowork

networks:
  flowork-net:
    driver: bridge

services:
  flowork_gateway:
    image: flowork/gateway:dev
    container_name: flowork_gateway
    build:
      context: ./flowork-gateway
      dockerfile: Dockerfile
    env_file:
      - .env

    # (English Hardcode) FIX 1: 'python seed_dev_engine.py' (This part is already working)
    entrypoint: ["/bin/bash", "-c", "dos2unix /app/entrypoint.sh && /app/entrypoint.sh && echo '[Flowork Entrypoint] Seeding default engine from .env to DB...' && python seed_dev_engine.py"]

    volumes:
      - ./flowork-gateway:/app
      - ./data:/app/data
      - ./healthchecks:/app/healthchecks
      - ./.env:/app/.env

    ports:
      - "${GW_PORT:-8000}:8000"

    networks:
      flowork-net:
        aliases:
          - gateway

    healthcheck:
      # (English Hardcode) This healthcheck is TOO SIMPLE and passes too early
      # (English Hardcode) But we can't fix it without the health_gateway.py file
      test: ["CMD-SHELL", "python /app/healthchecks/health_gateway.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


    restart: unless-stopped

  flowork_core:
    image: flowork/core:dev
    container_name: flowork_core
    build:
      context: ./flowork-core
      dockerfile: Dockerfile
    env_file:
      - .env

    volumes:
      - ./flowork-core:/app
      - ./data:/app/data
      - ./.env:/app/.env

      - ./modules:/app/flowork_kernel/modules
      - ./plugins:/app/flowork_kernel/plugins
      - ./tools:/app/flowork_kernel/tools
      - ./triggers:/app/flowork_kernel/triggers
      - ./ai_providers:/app/flowork_kernel/ai_providers
      - ./ai_models:/app/flowork_kernel/ai_models
      - ./formatters:/app/flowork_kernel/formatters
      - ./scanners:/app/flowork_kernel/scanners
      - ./assets:/app/flowork_kernel/assets

    ports:
      - "${CORE_PORT_TCP:-8989}:8989"
      - "${CORE_PORT_HTTP:-8990}:8990"
      - "${CORE_PORT_SOCKET:-5001}:5001"
    networks:
      - flowork-net

    depends_on:
      flowork_gateway:
        condition: service_healthy # (English Hardcode) This tells Core to wait (Working)

    healthcheck:
      test: ["CMD-SHELL", "python /app/healthchecks/health_core.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # (English Hardcode) This 30s delay is why Core works and Cloudflared fails (Working)

    restart: unless-stopped
    stdin_open: true
    tty: true

  flowork_cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: flowork_cloudflared
    restart: unless-stopped
    networks:
      - flowork-net

    # (English Hardcode) FIX 2: Using user's correct command. (Working)
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}

    depends_on:
      flowork_gateway:
        # (English Hardcode) FIX 3 (ADDED): This tells Cloudflared to wait for the Gateway
        # (English Hardcode) healthcheck to pass, just like Core does.
        condition: service_healthy